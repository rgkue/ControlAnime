<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil · ControlAnime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" type="image/x-icon" href="/static/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
    --bg:           #090909;
    --surface:      #111111;
    --surface2:     #181818;
    --surface3:     #1e1e1e;
    --border:       #222222;
    --border2:      #2a2a2a;
    --accent:       #f97316;
    --accent-dim:   rgba(249,115,22,0.12);
    --text:         #e8e8e8;
    --muted:        #666;
    --muted2:       #888;
    --green:        #4ade80;
    --red:          #f87171;
    --gold:         #fbbf24;
    --silver:       #94a3b8;
    --bronze:       #cd7c3a;
    --sidebar-w:    240px;
    --sidebar-collapsed: 64px;
    --topbar-h:     58px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

/* ── SIDEBAR ── */
.sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: width 0.25s; overflow: hidden; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
.sidebar.collapsed { width: var(--sidebar-collapsed); }
.sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border); height: var(--topbar-h); overflow: hidden; flex-shrink: 0; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.06em; color: var(--text); text-decoration: none; white-space: nowrap; transition: opacity 0.25s; }
.logo span { color: var(--accent); }
.sidebar.collapsed .logo { opacity: 0; pointer-events: none; width: 0; }
.collapse-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: color 0.25s, background 0.25s, transform 0.25s; flex-shrink: 0; }
.collapse-btn:hover { color: var(--accent); background: var(--accent-dim); }
.sidebar.collapsed .collapse-btn { transform: rotate(180deg); }
.sidebar-nav { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 6px; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 400; white-space: nowrap; transition: color 0.25s, background 0.25s; cursor: pointer; border: none; background: none; width: 100%; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent); background: var(--accent-dim); }
.nav-item.logout:hover { color: var(--red); background: rgba(248,113,113,0.1); }
.nav-icon { width: 18px; height: 18px; flex-shrink: 0; }
.nav-label { transition: opacity 0.25s, width 0.25s; overflow: hidden; }
.sidebar.collapsed .nav-label { opacity: 0; width: 0; }
.sidebar-footer { padding: 8px 8px 16px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; }

/* ── MAIN ── */
.main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; transition: margin-left 0.25s; }
.sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

/* ── TOPBAR ── */
.topbar { position: sticky; top: 0; z-index: 40; height: var(--topbar-h); background: rgba(9,9,9,0.9); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; gap: 12px; flex-shrink: 0; }
.topbar-back { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 0.82rem; cursor: pointer; border: none; background: none; font-family: inherit; padding: 6px 0; transition: color 0.15s; }
.topbar-back:hover { color: var(--text); }
.topbar-back svg { width: 16px; height: 16px; }
.topbar-sep { width: 1px; height: 18px; background: var(--border2); }
.topbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em; color: var(--muted); }
.topbar-user { margin-left: auto; display: flex; align-items: center; }
.user-chip { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 40px; padding: 6px 6px 6px 14px; cursor: pointer; transition: border-color 0.2s; }
.user-chip:hover { border-color: var(--accent); }
.topbar-email { font-size: 0.75rem; color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.topbar-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 600; color: #000; flex-shrink: 0; }
.topbar-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

/* ── PAGE CONTENT ── */
.perfil-page { width: 100%; padding: 0 0 80px; }

/* ── HEADER BANNER ── */
.perfil-banner {
    width: 100%; height: 220px;
    background: var(--surface2);
    position: relative; overflow: hidden;
    flex-shrink: 0;
}
.perfil-banner-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: transform 0.4s ease;
}
.perfil-banner:hover .perfil-banner-bg { transform: scale(1.02); }
.perfil-banner-fade {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 30%, rgba(9,9,9,0.85) 100%);
}
.perfil-banner-default {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
}
.perfil-banner-pattern {
    position: absolute; inset: -20px;
    opacity: 0.06;
    background-image: repeating-linear-gradient(
        45deg,
        var(--accent) 0px,
        var(--accent) 1px,
        transparent 1px,
        transparent 32px
    );
}

/* ── INNER CONTAINER ── */
.perfil-inner { width: 100%; padding: 0 32px; }

/* ── PERFIL IDENTITY ── */
.perfil-identity {
    padding: 0;
    margin-top: -52px;
    position: relative;
    display: flex;
    align-items: flex-end;
    gap: 18px;
    margin-bottom: 20px;
}
.perfil-av {
    width: 96px; height: 96px;
    border-radius: 50%;
    border: 4px solid var(--bg);
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem; color: #000;
    overflow: hidden; flex-shrink: 0;
    position: relative; z-index: 2;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.perfil-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.perfil-identity-info { padding-bottom: 6px; flex: 1; min-width: 0; }
.perfil-username {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem; letter-spacing: 0.04em;
    color: var(--text); line-height: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.perfil-meta { font-size: 0.76rem; color: var(--muted); margin-top: 4px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.perfil-meta-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--border2); }

/* ── REDES ── */
.perfil-redes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.red-link {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 7px 14px; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 8px;
    font-size: 0.78rem; font-weight: 500; color: var(--muted2);
    text-decoration: none; transition: all 0.15s;
}
.red-link:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
.red-link svg { width: 14px; height: 14px; flex-shrink: 0; }
.sin-redes { margin-bottom: 24px; font-size: 0.78rem; color: var(--muted); font-style: italic; }

/* ── STATS GRID ── */
.stats-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--border);
    border-radius: 12px; overflow: hidden;
    margin-bottom: 10px;
}
.stat-cell {
    background: var(--surface2);
    padding: 18px 14px; text-align: center;
    transition: background 0.15s;
}
.stat-cell:hover { background: var(--surface3); }
.stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; color: var(--accent);
    line-height: 1; display: block;
}
.stat-val.neutral { color: var(--muted2); font-size: 1.5rem; }
.stat-val.genero  { font-size: 1rem; padding-top: 6px; font-family: 'DM Sans', sans-serif; font-weight: 600; text-transform: capitalize; }
.stat-lbl {
    font-size: 0.6rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-top: 4px; display: block;
}
.horas-strip {
    text-align: center; padding-bottom: 24px;
    font-size: 0.78rem; color: var(--muted);
}
.horas-strip strong { color: var(--muted2); font-weight: 500; }

/* ── SECCIÓN GENÉRICA ── */
.perfil-section { margin-bottom: 28px; }
.sec-title {
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
}
.sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── TOP 5 ── */
.top5-list { display: flex; flex-direction: column; gap: 8px; }
.top5-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    transition: border-color 0.15s, background 0.15s;
    cursor: default;
}
.top5-item:hover { border-color: var(--border2); background: var(--surface3); }
.pos-badge {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 0.88rem;
    font-weight: 700; flex-shrink: 0;
}
.pos-badge.p1 { background: var(--gold);   color: #000; }
.pos-badge.p2 { background: var(--silver); color: #000; }
.pos-badge.p3 { background: var(--bronze); color: #fff; }
.pos-badge.px { background: var(--surface3); color: var(--muted2); border: 1px solid var(--border2); }
.top5-poster { width: 40px; height: 56px; border-radius: 5px; object-fit: cover; background: var(--surface3); flex-shrink: 0; }
.top5-info { flex: 1; min-width: 0; }
.top5-titulo { font-size: 0.86rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.top5-rating { font-size: 0.72rem; color: var(--accent); margin-top: 3px; }
.top5-empty { padding: 28px; text-align: center; color: var(--muted); font-size: 0.82rem; background: var(--surface2); border-radius: 10px; border: 1px dashed var(--border2); }

/* ── ANIMES RECIENTES ── */
.recientes-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
}
.reciente-card { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 2/3; background: var(--surface3); cursor: default; }
.reciente-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.25s; }
.reciente-card:hover img { transform: scale(1.05); }
.reciente-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 55%);
    opacity: 0; transition: opacity 0.2s;
    display: flex; align-items: flex-end; padding: 8px;
}
.reciente-card:hover .reciente-overlay { opacity: 1; }
.reciente-titulo { font-size: 0.65rem; font-weight: 500; line-height: 1.3; color: #fff; }
.reciente-noposter {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; color: var(--muted);
}

/* ── GÉNEROS ── */
.generos-list { display: flex; flex-direction: column; gap: 8px; }
.genero-row { display: flex; align-items: center; gap: 12px; }
.genero-name { font-size: 0.82rem; font-weight: 500; min-width: 110px; }
.genero-bar-wrap { flex: 1; height: 6px; background: var(--border2); border-radius: 6px; overflow: hidden; }
.genero-bar { height: 100%; background: var(--accent); border-radius: 6px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); width: 0; }
.genero-count { font-size: 0.72rem; color: var(--muted); min-width: 24px; text-align: right; }

/* ── ESTADOS ── */
.estado-page {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 14px; color: var(--muted);
    padding: 40px;
}
.estado-page svg { opacity: 0.35; }
.estado-page h2 { font-size: 1rem; color: var(--text); }
.estado-page p { font-size: 0.84rem; text-align: center; max-width: 300px; line-height: 1.6; }
.btn-volver { display: inline-flex; align-items: center; gap: 8px; margin-top: 8px; padding: 9px 20px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--muted2); font-size: 0.84rem; font-family: inherit; cursor: pointer; text-decoration: none; transition: all 0.15s; }
.btn-volver:hover { color: var(--text); border-color: var(--muted); }

/* ── LOADER ── */
.loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 0; gap: 14px; color: var(--muted); }
.spinner { width: 28px; height: 28px; border: 2.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeUp 0.35s ease forwards; }

/* ── RESPONSIVE ── */
@media (max-width: 860px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .topbar { padding: 0 16px; }
    .topbar-email { display: none; }
    .perfil-inner { padding: 0 16px; }
    .recientes-grid { grid-template-columns: repeat(3, 1fr); }
    .perfil-banner { height: 140px; }
    .perfil-av { width: 76px; height: 76px; font-size: 1.6rem; }
    .perfil-username { font-size: 1.5rem; }
}
</style>
</head>

            Ranking

        <span class="topbar-title" id="topbarTitle">PERFIL</span>

                <span class="topbar-email" id="topbarEmail"></span>

<script>
// ── HELPERS ───────────────────────────────────────────
function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── INIT ──────────────────────────────────────────────
async function init() {
    // Sidebar collapse
    const sidebar = document.getElementById('sidebar')
    const btn     = document.getElementById('collapseBtn')
    if (localStorage.getItem('sidebarCollapsed') === 'true') sidebar.classList.add('collapsed')
    btn.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed')
        localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'))
    })

    // Topbar del usuario actual (puede fallar si no hay sesión — pero la página es pública)
    try {
        const res = await fetch('/me')
        if (res.ok) {
            const me = await res.json()
            document.getElementById('topbarEmail').textContent = me.email || ''
            const av = document.getElementById('topbarAvatar')
            if (me.foto_perfil) av.innerHTML = `<img src="${me.foto_perfil}" alt="avatar">`
            else av.textContent = (me.email || '?').slice(0, 2).toUpperCase()
        }
    } catch(e) {}

    // Extraer ID del usuario de la URL
    const match = location.pathname.match(/\/usuario\/(\d+)/)
    if (!match) { renderError('URL inválida', 'No se encontró un ID de usuario en la URL.'); return }
    const userId = parseInt(match[1])

    await cargarPerfil(userId)
}

// ── CARGAR PERFIL ─────────────────────────────────────
async function cargarPerfil(userId) {
    try {
        const res = await fetch(`/perfil/${userId}`)

        if (res.status === 403) { renderPrivado(); return }
        if (res.status === 404) { renderError('Usuario no encontrado', 'Este perfil no existe o fue eliminado.'); return }
        if (!res.ok) throw new Error()

        const data = await res.json()
        renderPerfil(data)
    } catch(e) {
        renderError('Error al cargar', 'No se pudo conectar con el servidor. Intenta de nuevo.')
    }
}

// ── RENDER PERFIL ─────────────────────────────────────
function renderPerfil(data) {
    const u      = data.usuario
    const stats  = data.stats
    const top5   = data.top5   || []
    const vistos = data.vistos || []

    // Actualizar título topbar
    document.getElementById('topbarTitle').textContent = (u.username || 'Perfil').toUpperCase()
    document.title = `${u.username || 'Perfil'} · ControlAnime`

    const inicial    = (u.username || '?')[0].toUpperCase()
    const avatarHTML = u.foto_perfil
        ? `<img src="${esc(u.foto_perfil)}" alt="${esc(u.username)}">`
        : inicial

    // Header banner
    let bannerInner = ''
    if (u.perfil_header_imagen) {
        bannerInner = `<div class="perfil-banner-bg" style="background-image:url('${esc(u.perfil_header_imagen)}')"></div><div class="perfil-banner-fade"></div>`
    } else if (u.perfil_header_color && u.perfil_header_color !== '#111111') {
        bannerInner = `<div class="perfil-banner-bg" style="background:${esc(u.perfil_header_color)}"></div><div class="perfil-banner-fade"></div>`
    } else {
        bannerInner = `<div class="perfil-banner-default"><div class="perfil-banner-pattern"></div></div><div class="perfil-banner-fade"></div>`
    }

    // Fecha miembro
    let miembroStr = ''
    if (u.creado_en) {
        try { miembroStr = new Date(u.creado_en).toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }) } catch(e) {}
    }

    // Redes sociales
    const redesHTML = buildRedes(u)

    // Stats
    const generoDestacado = stats.top_generos?.[0]?.nombre || null
    const totalVistos     = stats.total_vistos || 0
    const top5Activos     = top5.length

    // Horas estimadas (24 min/ep aprox — usando los vistos del perfil)
    // La API no devuelve eps_totales en el perfil, usamos 24 min * vistos como estimación rápida
    // Si el backend devuelve horas, usar eso; si no, omitir
    const horasStr = null // reservado para cuando el backend lo incluya

    // Top 5 HTML
    const posClases = ['p1','p2','p3','px','px']
    const top5HTML = top5.length
        ? top5.map((a, i) => `
            <div class="top5-item">
                <div class="pos-badge ${posClases[i] || 'px'}">#${a.posicion}</div>
                ${a.poster_url
                    ? `<img class="top5-poster" src="${esc(a.poster_url)}" alt="${esc(a.titulo)}" loading="lazy">`
                    : `<div class="top5-poster" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem">📺</div>`}
                <div class="top5-info">
                    <div class="top5-titulo">${esc(a.titulo)}</div>
                    ${a.rating ? `<div class="top5-rating">★ ${a.rating}</div>` : ''}
                </div>
            </div>`).join('')
        : `<div class="top5-empty">Este otaku aún no ha configurado su Top 5.</div>`

    // Animes recientes (últimos 6)
    const recientes = vistos.slice(0, 6)
    const recientesHTML = recientes.length
        ? recientes.map(a => `
            <div class="reciente-card" title="${esc(a.titulo)}">
                ${a.poster_url
                    ? `<img src="${esc(a.poster_url)}" alt="${esc(a.titulo)}" loading="lazy">`
                    : `<div class="reciente-noposter">📺</div>`}
                <div class="reciente-overlay">
                    <div class="reciente-titulo">${esc(a.titulo)}</div>
                </div>
            </div>`).join('')
        : ''

    // Géneros
    const generosHTML = buildGeneros(stats.top_generos || [])

    // Ensamblar
    const html = `
    <div class="perfil-page fade-in">

        <!-- Banner -->
        <div class="perfil-banner">${bannerInner}</div>

        <div class="perfil-inner">

        <!-- Identidad -->
        <div class="perfil-identity">
            <div class="perfil-av">${avatarHTML}</div>
            <div class="perfil-identity-info">
                <div class="perfil-username">${esc(u.username || 'Otaku anónimo')}</div>
                <div class="perfil-meta">
                    ${miembroStr ? `<span>Miembro desde ${miembroStr}</span>` : ''}
                    ${miembroStr && totalVistos ? `<span class="perfil-meta-sep"></span>` : ''}
                    ${totalVistos ? `<span>${totalVistos} animes vistos</span>` : ''}
                </div>
            </div>
        </div>

        <!-- Redes -->
        ${redesHTML}

        <!-- Stats -->
        <div class="stats-strip">
            <div class="stat-cell">
                <span class="stat-val">${totalVistos}</span>
                <span class="stat-lbl">Animes vistos</span>
            </div>
            <div class="stat-cell">
                <span class="stat-val">${top5Activos}</span>
                <span class="stat-lbl">Top 5 activo</span>
            </div>
            <div class="stat-cell">
                <span class="stat-val genero">${generoDestacado ? esc(generoDestacado) : '—'}</span>
                <span class="stat-lbl">Género favorito</span>
            </div>
        </div>

        <!-- Top 5 -->
        <div class="perfil-section">
            <div class="sec-title">Top 5 Favoritos</div>
            <div class="top5-list">${top5HTML}</div>
        </div>

        ${recientes.length ? `
        <!-- Vistos recientemente -->
        <div class="perfil-section">
            <div class="sec-title">Visto recientemente</div>
            <div class="recientes-grid">${recientesHTML}</div>
        </div>` : ''}

        ${stats.top_generos?.length ? `
        <!-- Géneros -->
        <div class="perfil-section">
            <div class="sec-title">Géneros más vistos</div>
            <div class="generos-list" id="generosList">${generosHTML}</div>
        </div>` : ''}

        </div><!-- /perfil-inner -->
    </div>`

    document.getElementById('pageContent').innerHTML = html

    // Animar barras de géneros después de renderizar
    requestAnimationFrame(() => {
        document.querySelectorAll('.genero-bar[data-w]').forEach(bar => {
            setTimeout(() => { bar.style.width = bar.dataset.w }, 80)
        })
    })
}

// ── REDES SOCIALES ────────────────────────────────────
function buildRedes(u) {
    const items = []

    if (u.instagram) items.push(`
        <a class="red-link" href="${esc(u.instagram)}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>
            Instagram
        </a>`)

    if (u.discord) items.push(`
        <a class="red-link" href="${esc(u.discord)}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.045.036.059a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
            Discord
        </a>`)

    if (u.tiktok) items.push(`
        <a class="red-link" href="${esc(u.tiktok)}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.27 8.27 0 0 0 4.83 1.53V6.78a4.85 4.85 0 0 1-1.06-.09z"/></svg>
            TikTok
        </a>`)

    if (!items.length) return `<p class="sin-redes">Sin redes sociales configuradas.</p>`
    return `<div class="perfil-redes">${items.join('')}</div>`
}

// ── GÉNEROS ───────────────────────────────────────────
function buildGeneros(topGeneros) {
    if (!topGeneros.length) return ''
    const max = topGeneros[0]?.cantidad || 1
    return topGeneros.map(g => {
        const pct = Math.round((g.cantidad / max) * 100)
        return `
        <div class="genero-row">
            <div class="genero-name">${esc(g.nombre)}</div>
            <div class="genero-bar-wrap">
                <div class="genero-bar" data-w="${pct}%"></div>
            </div>
            <div class="genero-count">${g.cantidad}</div>
        </div>`
    }).join('')
}

// ── ESTADOS ───────────────────────────────────────────
function renderPrivado() {
    document.getElementById('pageContent').innerHTML = `
    <div class="estado-page fade-in">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <h2>Perfil privado</h2>
        <p>Este otaku prefiere mantener su perfil fuera del radar.</p>
        <a class="btn-volver" href="/ranking">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
            Volver al ranking
        </a>
    </div>`
}

function renderError(titulo, desc) {
    document.getElementById('pageContent').innerHTML = `
    <div class="estado-page fade-in">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <h2>${esc(titulo)}</h2>
        <p>${esc(desc)}</p>
        <a class="btn-volver" href="/ranking">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
            Volver al ranking
        </a>
    </div>`
}

// ── ARRANCAR ──────────────────────────────────────────
init()
</script>
