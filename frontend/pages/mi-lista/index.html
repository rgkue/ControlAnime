<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista — ControlAnime</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/static/logo.png">
    <link rel="stylesheet" href="/static/pages/mi-lista/style.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a href="/dashboard" class="logo">Control<span>Anime</span></a>
        <button class="collapse-btn" id="collapseBtn" title="Colapsar sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 19l-7-7 7-7"/><path d="M19 19l-7-7 7-7"/></svg>
        </button>
    </div>
    <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="nav-label">Inicio</span>
        </a>
        <a href="/mi-lista" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            <span class="nav-label">Mi lista</span>
        </a>
        <a href="/mi-top" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <span class="nav-label">Mi Top 5</span>
        </a>
        <a href="/populares" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            <span class="nav-label">Tendencias</span>
        </a>
        <a href="/emision" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
            <span class="nav-label">En emisión</span>
        </a>
        <a href="/ranking" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 20 18 10"/><polyline points="12 20 12 4"/><polyline points="6 20 6 14"/></svg>
            <span class="nav-label">Ranking</span>
        </a>
        <a href="/estadisticas" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
            <span class="nav-label">Estadísticas</span>
        </a>
        <a href="/exportar" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span class="nav-label">Exportar</span>
        </a>
    </nav>
    <div class="sidebar-footer">
        <a href="/configuracion" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span class="nav-label">Configuración</span>
        </a>
        <a class="nav-item logout" href="#" onclick="event.preventDefault(); fetch('/logout',{method:'POST'}).finally(()=>location.href='/login')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span class="nav-label">Cerrar sesión</span>
        </a>
    </div>
</aside>

<!-- MAIN -->
<div class="main" id="main">
    <header class="topbar">
        <div class="topbar-left">
            <button class="menu-btn" id="menuBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 class="page-title">MI LISTA</h1>
        </div>
        <div class="topbar-right">
            <div class="user-chip" id="userChip" style="cursor:pointer" title="Configuración" onclick="location.href='/configuracion'">
                <span class="user-email" id="userEmail">Cargando...</span>
                <div class="user-avatar" id="userAvatar">?</div>
            </div>
        </div>
    </header>

    <main class="content">
        <section class="section active" id="section-mi-lista">

            <!-- TABS -->
            <div class="ml-toolbar" style="border-bottom:1px solid var(--border);margin-bottom:0;padding-bottom:0;gap:0">
                <div style="display:flex;flex:1">
                    <button class="ml-tab tab active" id="mlTabVistos">👁 Vistos</button>
                    <button class="ml-tab tab" id="mlTabPendientes">⏳ Pendientes</button>
                    <button class="ml-tab tab" id="mlTabLikes">❤ Me gusta</button>
                    <button class="ml-tab tab" id="mlTabAbandonados">🚫 Abandonados</button>
                    <button class="ml-tab tab" id="mlTabHistorial">📅 Historial</button>
                </div>
                <div id="mlVistaBtns" style="display:flex;gap:6px;align-items:center;padding:0 4px 8px">
                    <button class="vista-btn active" id="mlBtnCards" title="Vista cards">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    </button>
                    <button class="vista-btn" id="mlBtnFilas" title="Vista filas">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                </div>
            </div>

            <!-- FILTROS (ocultos en historial) -->
            <div class="ml-toolbar" id="mlFiltros" style="margin-top:16px">
                <div class="ml-search-wrap">
                    <svg class="ml-search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" class="ml-search-input" id="mlSearch" placeholder="Buscar en mi lista...">
                    <button class="ml-search-clear" id="mlSearchClear">✕</button>
                </div>
                <select class="ml-orden-select" id="mlGeneroSelect">
                    <option value="">Género</option>
                </select>
                <select class="ml-orden-select" id="mlAnioSelect">
                    <option value="">Año</option>
                </select>
                <select class="ml-orden-select" id="mlOrdenSelect">
                    <option value="fecha-desc">Más reciente</option>
                    <option value="fecha-asc">Más antiguo</option>
                    <option value="titulo-az">Título A–Z</option>
                    <option value="titulo-za">Título Z–A</option>
                    <option value="rating-desc">Mejor valorado</option>
                </select>
            </div>

            <div id="tabContent"></div>

        </section>
    </main>
</div>

<script src="/static/pages/mi-lista/script.js"></script>
</body>
</html>
