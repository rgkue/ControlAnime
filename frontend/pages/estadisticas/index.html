<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadísticas · ControlAnime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" type="image/x-icon" href="/static/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
    --bg:           #090909;
    --surface:      #111111;
    --surface2:     #181818;
    --surface3:     #1e1e1e;
    --border:       #222222;
    --border2:      #2a2a2a;
    --accent:       #f97316;
    --accent-dim:   rgba(249,115,22,0.12);
    --text:         #e8e8e8;
    --muted:        #666;
    --muted2:       #888;
    --green:        #4ade80;
    --red:          #f87171;
    --blue:         #60a5fa;
    --pink:         #f472b6;
    --sidebar-w:    240px;
    --sidebar-collapsed: 64px;
    --topbar-h:     58px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

/* ── SIDEBAR ── */
.sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: width 0.25s; overflow: hidden; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
.sidebar.collapsed { width: var(--sidebar-collapsed); }
.sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border); height: var(--topbar-h); overflow: hidden; flex-shrink: 0; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.06em; color: var(--text); text-decoration: none; white-space: nowrap; transition: opacity 0.25s; }
.logo span { color: var(--accent); }
.sidebar.collapsed .logo { opacity: 0; pointer-events: none; width: 0; }
.collapse-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: color 0.25s, background 0.25s, transform 0.25s; flex-shrink: 0; }
.collapse-btn:hover { color: var(--accent); background: var(--accent-dim); }
.sidebar.collapsed .collapse-btn { transform: rotate(180deg); }
.sidebar-nav { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 6px; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 400; white-space: nowrap; transition: color 0.25s, background 0.25s; cursor: pointer; border: none; background: none; width: 100%; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent); background: var(--accent-dim); }
.nav-item.logout:hover { color: var(--red); background: rgba(248,113,113,0.1); }
.nav-icon { width: 18px; height: 18px; flex-shrink: 0; }
.nav-label { transition: opacity 0.25s, width 0.25s; overflow: hidden; }
.sidebar.collapsed .nav-label { opacity: 0; width: 0; }
.sidebar-footer { padding: 8px 8px 16px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; }

/* ── MAIN ── */
.main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; transition: margin-left 0.25s; }
.sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

/* ── TOPBAR ── */
.topbar { position: sticky; top: 0; z-index: 40; height: var(--topbar-h); background: rgba(9,9,9,0.9); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 36px; gap: 12px; flex-shrink: 0; }
.topbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em; color: var(--text); }
.topbar-user { margin-left: auto; display: flex; align-items: center; }
.user-chip { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 40px; padding: 6px 6px 6px 14px; cursor: pointer; transition: border-color 0.2s; }
.user-chip:hover { border-color: var(--accent); }
.topbar-email { font-size: 0.75rem; color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.topbar-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 600; color: #000; flex-shrink: 0; }
.topbar-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

/* ── PAGE BODY ── */
.page-body { padding: 28px 36px 60px; width: 100%; }

/* ── STAT CARDS ── */
.stat-cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 18px;
    display: flex; flex-direction: column; gap: 4px;
    position: relative; overflow: hidden;
    transition: border-color 0.15s;
}
.stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: var(--card-color, var(--border2));
    opacity: 0.7;
}
.stat-card:hover { border-color: var(--card-color, var(--border2)); }
.stat-card-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem; line-height: 1;
    color: var(--card-color, var(--text));
}
.stat-card-label {
    font-size: 0.62rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
}
.stat-card-sub { font-size: 0.72rem; color: var(--muted2); margin-top: 2px; }

/* Card de miembro — diferente layout */
.stat-card.miembro .stat-card-val { font-size: 1rem; font-family: 'DM Sans', sans-serif; font-weight: 600; text-transform: capitalize; color: var(--text); }

/* ── SECTION BLOCK ── */
.section-block {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 24px;
    margin-bottom: 20px;
}
.section-block-title {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem; letter-spacing: 0.12em;
    color: var(--text); margin-bottom: 4px;
}
.section-block-title::before {
    content: ''; width: 3px; height: 16px;
    background: var(--accent); border-radius: 2px; flex-shrink: 0;
}
.section-block-sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 18px; }

/* ── GRÁFICO DE LÍNEA ── */
.chart-wrap { position: relative; width: 100%; height: 200px; }
.chart-svg { width: 100%; height: 100%; overflow: visible; }
.chart-grid-line { stroke: var(--border); stroke-width: 1; }
.chart-axis-label { fill: var(--muted); font-size: 10px; font-family: 'DM Sans', sans-serif; }
.chart-line { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; }
.chart-area { fill: url(#areaGrad); }
.chart-dot { fill: var(--accent); stroke: var(--bg); stroke-width: 2; cursor: pointer; transition: r 0.15s; }
.chart-dot:hover { r: 6; }
.chart-tooltip {
    position: absolute; pointer-events: none;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 6px; padding: 6px 10px;
    font-size: 0.76rem; color: var(--text);
    white-space: nowrap; opacity: 0; transition: opacity 0.1s;
    z-index: 10;
}
.chart-val-bubble {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.78rem; fill: var(--text);
}

/* ── GÉNEROS ── */
.generos-grid { display: flex; flex-direction: column; gap: 10px; }
.genero-row { display: flex; align-items: center; gap: 12px; }
.genero-name { font-size: 0.84rem; font-weight: 500; min-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.genero-bar-wrap { flex: 1; height: 8px; background: var(--border2); border-radius: 8px; overflow: hidden; }
.genero-bar { height: 100%; background: var(--accent); border-radius: 8px; width: 0; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }
.genero-pct { font-size: 0.72rem; color: var(--muted); min-width: 36px; text-align: right; }
.genero-count { font-size: 0.72rem; color: var(--muted2); min-width: 20px; text-align: right; }
.empty-state { text-align: center; padding: 32px; color: var(--muted); font-size: 0.84rem; }

/* ── ÚLTIMOS AGREGADOS ── */
.ultimos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.ultimo-card {
    display: flex; flex-direction: column; gap: 8px;
    background: var(--surface3); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    transition: border-color 0.15s;
    cursor: default;
}
.ultimo-card:hover { border-color: var(--border2); }
.ultimo-poster-wrap { position: relative; aspect-ratio: 2/3; overflow: hidden; background: var(--border2); }
.ultimo-poster-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
.ultimo-card:hover .ultimo-poster-wrap img { transform: scale(1.04); }
.ultimo-tipo-badge {
    position: absolute; top: 6px; left: 6px;
    font-size: 0.58rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 2px 7px;
    border-radius: 4px; backdrop-filter: blur(4px);
}
.tipo-visto     { background: rgba(74,222,128,0.2); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
.tipo-pendiente { background: rgba(96,165,250,0.2); color: var(--blue);  border: 1px solid rgba(96,165,250,0.3); }
.tipo-favorito  { background: rgba(244,114,182,0.2); color: var(--pink);  border: 1px solid rgba(244,114,182,0.3); }
.ultimo-info { padding: 0 8px 8px; }
.ultimo-titulo { font-size: 0.76rem; font-weight: 500; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.ultimo-rating { font-size: 0.68rem; color: var(--accent); margin-top: 3px; }
.ultimo-fecha { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

/* ── LOADER ── */
.loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; gap: 14px; color: var(--muted); }
.spinner { width: 28px; height: 28px; border: 2.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeUp 0.3s ease forwards; }

/* ── SCORE BADGE ── */
.score-badge { display: inline-flex; align-items: baseline; gap: 4px; }
.score-badge .val { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--accent); line-height: 1; }
.score-badge .max { font-size: 0.78rem; color: var(--muted); }

/* ── RESPONSIVE ── */
@media (max-width: 1100px) {
    .stat-cards { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 860px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .page-body { padding: 20px 16px 48px; }
    .topbar { padding: 0 16px; }
    .topbar-email { display: none; }
    .stat-cards { grid-template-columns: repeat(2, 1fr); }
    .ultimos-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}
</style>
</head>
<body>

</nav>

<!-- MAIN -->
<div class="main">
    <div class="topbar">
        <span class="topbar-title">ESTADÍSTICAS</span>
        <div class="topbar-user">
            <div class="user-chip" onclick="location.href='/configuracion'" title="Configuración">
                <span class="topbar-email" id="topbarEmail"></span>
                <div class="topbar-avatar" id="topbarAvatar"></div>
            </div>
        </div>
    </div>

    <div class="page-body" id="pageBody">
        <div class="loader"><div class="spinner"></div><span>Cargando estadísticas…</span></div>
    </div>
</div>

<div class="chart-tooltip" id="chartTooltip"></div>

<script>
// ── CSRF ──────────────────────────────────────────────
function csrf() {
    const m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/)
    return m ? { 'X-CSRF-Token': decodeURIComponent(m[1]) } : {}
}

function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── INIT ──────────────────────────────────────────────
async function init() {
    // Sidebar
    const sidebar = document.getElementById('sidebar')
    const btn     = document.getElementById('collapseBtn')
    if (localStorage.getItem('sidebarCollapsed') === 'true') sidebar.classList.add('collapsed')
    btn.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed')
        localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'))
    })

    // Topbar
    try {
        const res = await fetch('/me')
        if (res.status === 401) { location.href = '/login'; return }
        const me = await res.json()
        document.getElementById('topbarEmail').textContent = me.email || ''
        const av = document.getElementById('topbarAvatar')
        if (me.foto_perfil) av.innerHTML = `<img src="${me.foto_perfil}" alt="avatar">`
        else av.textContent = (me.email || '?').slice(0, 2).toUpperCase()
    } catch(e) { location.href = '/login'; return }

    // Cargar datos
    try {
        const res  = await fetch('/estadisticas/data')
        if (res.status === 401) { location.href = '/login'; return }
        const data = await res.json()
        renderPage(data)
    } catch(e) {
        document.getElementById('pageBody').innerHTML =
            '<div class="loader"><span style="color:var(--red)">Error al cargar estadísticas.</span></div>'
    }
}

// ── RENDER PAGE ───────────────────────────────────────
function renderPage(data) {
    const { resumen, actividad, generos, ultimos, score } = data

    // Fecha miembro
    let miembroStr = '—'
    if (resumen.miembro_desde) {
        try { miembroStr = new Date(resumen.miembro_desde).toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }) } catch(e) {}
    }

    // Horas formateadas
    const horasStr = resumen.horas >= 1000
        ? `${(resumen.horas / 1000).toFixed(1)}k h`
        : `${resumen.horas} h`

    const html = `
    <div class="fade-in">

        <!-- STAT CARDS -->
        <div class="stat-cards">
            <div class="stat-card" style="--card-color: var(--text)">
                <div class="stat-card-val">${resumen.total}</div>
                <div class="stat-card-label">Total</div>
                <div class="stat-card-sub">en tu lista</div>
            </div>
            <div class="stat-card" style="--card-color: var(--accent)">
                <div class="stat-card-val">${resumen.vistos}</div>
                <div class="stat-card-label">Vistos</div>
                <div class="stat-card-sub">${horasStr} estimadas</div>
            </div>
            <div class="stat-card" style="--card-color: var(--blue)">
                <div class="stat-card-val" style="color:var(--blue)">${resumen.pendientes}</div>
                <div class="stat-card-label">Pendientes</div>
                <div class="stat-card-sub">por ver</div>
            </div>
            <div class="stat-card" style="--card-color: var(--pink)">
                <div class="stat-card-val" style="color:var(--pink)">${resumen.favoritos}</div>
                <div class="stat-card-label">Favoritos</div>
                <div class="stat-card-sub">guardados</div>
            </div>
            <div class="stat-card miembro" style="--card-color: var(--muted2)">
                <div class="stat-card-label">Miembro desde</div>
                <div class="stat-card-val" style="margin-top:6px">${miembroStr}</div>
                ${score != null ? `<div class="stat-card-sub" style="margin-top:6px">Score prom. <strong style="color:var(--accent)">${score}</strong></div>` : ''}
            </div>
        </div>

        <!-- HISTORIAL DE ACTIVIDAD -->
        <div class="section-block">
            <div class="section-block-title">Historial de actividad</div>
            <div class="section-block-sub">Animes agregados por mes</div>
            <div class="chart-wrap" id="chartWrap"></div>
        </div>

        <!-- GÉNEROS -->
        <div class="section-block">
            <div class="section-block-title">Géneros en tu lista</div>
            <div class="section-block-sub">Top 10 géneros más presentes</div>
            <div id="generosWrap"></div>
        </div>

        <!-- ÚLTIMOS AGREGADOS -->
        <div class="section-block">
            <div class="section-block-title">Últimos agregados</div>
            <div class="section-block-sub">Los 10 animes más recientes en tu lista</div>
            <div id="ultimosWrap"></div>
        </div>

    </div>`

    document.getElementById('pageBody').innerHTML = html

    // Render componentes
    renderChart(actividad)
    renderGeneros(generos)
    renderUltimos(ultimos)
}

// ── GRÁFICO SVG ───────────────────────────────────────
function renderChart(actividad) {
    const wrap = document.getElementById('chartWrap')
    if (!wrap || !actividad.length) {
        wrap.innerHTML = '<div class="empty-state">Sin datos de actividad.</div>'
        return
    }

    const W = wrap.clientWidth || 800
    const H = 200
    const PAD = { top: 16, right: 40, bottom: 40, left: 36 }
    const innerW = W - PAD.left - PAD.right
    const innerH = H - PAD.top - PAD.bottom

    const vals    = actividad.map(d => d.cantidad)
    const maxVal  = Math.max(...vals, 1)
    const n       = actividad.length

    // Escala
    const xScale = i => PAD.left + (i / (n - 1)) * innerW
    const yScale = v => PAD.top + innerH - (v / maxVal) * innerH

    // Puntos
    const pts = actividad.map((d, i) => ({ x: xScale(i), y: yScale(d.cantidad), ...d }))

    // Path línea y área
    const linePath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')
    const areaPath = [
        `M${pts[0].x.toFixed(1)},${(PAD.top + innerH).toFixed(1)}`,
        ...pts.map(p => `L${p.x.toFixed(1)},${p.y.toFixed(1)}`),
        `L${pts[pts.length-1].x.toFixed(1)},${(PAD.top + innerH).toFixed(1)}`,
        'Z'
    ].join(' ')

    // Eje Y — 4 líneas guía
    const yTicks = [0, 0.33, 0.67, 1].map(t => Math.round(t * maxVal))
    const yGridLines = yTicks.map(v => {
        const y = yScale(v).toFixed(1)
        return `
        <line class="chart-grid-line" x1="${PAD.left}" y1="${y}" x2="${W - PAD.right}" y2="${y}"/>
        <text class="chart-axis-label" x="${PAD.left - 6}" y="${y}" text-anchor="end" dominant-baseline="middle">${v}</text>`
    }).join('')

    // Labels eje X — mostrar cada 2 meses
    const xLabels = actividad.map((d, i) => {
        if (i % 2 !== 0 && i !== n - 1) return ''
        const [y, m] = d.mes.split('-')
        const label = new Date(parseInt(y), parseInt(m) - 1, 1)
            .toLocaleDateString('es-ES', { month: 'short', year: '2-digit' })
        const x = xScale(i).toFixed(1)
        return `<text class="chart-axis-label" x="${x}" y="${H - 6}" text-anchor="middle">${label}</text>`
    }).join('')

    // Dots con valor bubble en el último punto
    const dots = pts.map((p, i) => {
        const isLast = i === n - 1
        const isMax  = p.cantidad === maxVal && maxVal > 0
        const show   = isLast || isMax
        return `
        <circle class="chart-dot" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${show ? 4.5 : 3}"
            data-mes="${esc(p.mes)}" data-val="${p.cantidad}"
            onmouseenter="showTooltip(event,this)" onmouseleave="hideTooltip()"/>
        ${show ? `<text class="chart-val-bubble" x="${p.x.toFixed(1)}" y="${(p.y - 10).toFixed(1)}" text-anchor="middle">${p.cantidad}</text>` : ''}`
    }).join('')

    wrap.innerHTML = `
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs>
            <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.18"/>
                <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
            </linearGradient>
        </defs>
        ${yGridLines}
        ${xLabels}
        <path class="chart-area" d="${areaPath}"/>
        <path class="chart-line" d="${linePath}"/>
        ${dots}
    </svg>`
}

function showTooltip(e, el) {
    const tt = document.getElementById('chartTooltip')
    const mes = el.dataset.mes
    const val = el.dataset.val
    const [y, m] = mes.split('-')
    const label = new Date(parseInt(y), parseInt(m) - 1, 1)
        .toLocaleDateString('es-ES', { month: 'long', year: 'numeric' })
    tt.innerHTML = `<strong>${val}</strong> anime${val != 1 ? 's' : ''} · ${label}`
    tt.style.opacity = '1'
    tt.style.left = (e.pageX + 12) + 'px'
    tt.style.top  = (e.pageY - 28) + 'px'
}
function hideTooltip() {
    document.getElementById('chartTooltip').style.opacity = '0'
}

// ── GÉNEROS ───────────────────────────────────────────
function renderGeneros(generos) {
    const wrap = document.getElementById('generosWrap')
    if (!generos.length) {
        wrap.innerHTML = '<div class="empty-state">Todavía no hay géneros suficientes para mostrar.</div>'
        return
    }

    wrap.innerHTML = `<div class="generos-grid">${
        generos.map(g => `
        <div class="genero-row">
            <div class="genero-name">${esc(g.nombre)}</div>
            <div class="genero-bar-wrap">
                <div class="genero-bar" data-pct="${g.porcentaje}"></div>
            </div>
            <div class="genero-pct">${g.porcentaje}%</div>
            <div class="genero-count">${g.cantidad}</div>
        </div>`).join('')
    }</div>`

    // Animar barras
    requestAnimationFrame(() => {
        document.querySelectorAll('.genero-bar[data-pct]').forEach(bar => {
            setTimeout(() => { bar.style.width = bar.dataset.pct + '%' }, 60)
        })
    })
}

// ── ÚLTIMOS AGREGADOS ─────────────────────────────────
function renderUltimos(ultimos) {
    const wrap = document.getElementById('ultimosWrap')
    if (!ultimos.length) {
        wrap.innerHTML = '<div class="empty-state">No hay animes en tu lista aún.</div>'
        return
    }

    const tipoClase = { visto: 'tipo-visto', pendiente: 'tipo-pendiente', favorito: 'tipo-favorito' }

    wrap.innerHTML = `<div class="ultimos-grid">${
        ultimos.map(a => {
            let fechaStr = ''
            try {
                fechaStr = new Date(a.agregado_en).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' })
            } catch(e) {}

            return `
            <div class="ultimo-card">
                <div class="ultimo-poster-wrap">
                    ${a.poster_url
                        ? `<img src="${esc(a.poster_url)}" alt="${esc(a.titulo)}" loading="lazy">`
                        : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:1.6rem">📺</div>`}
                    <span class="ultimo-tipo-badge ${tipoClase[a.tipo] || ''}">${esc(a.tipo)}</span>
                </div>
                <div class="ultimo-info">
                    <div class="ultimo-titulo">${esc(a.titulo)}</div>
                    ${a.rating ? `<div class="ultimo-rating">★ ${a.rating}</div>` : ''}
                    <div class="ultimo-fecha">${fechaStr}</div>
                </div>
            </div>`
        }).join('')
    }</div>`
}

// ── ARRANCAR ──────────────────────────────────────────
init()
</script>
</body>
</html>
