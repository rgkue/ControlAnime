<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar cuenta — ControlAnime</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/static/logo.png">
    <link rel="stylesheet" href="/static/pages/verify_email/style.css">
</head>
<body>

<div class="page">

    <a href="/" class="logo">Control<span>Anime</span></a>

    <div class="card">
        <div class="card-icon">✉️</div>
        <h1>Verifica tu correo</h1>
        <p>Enviamos un código de 6 dígitos a tu correo. Ingrésalo abajo para activar tu cuenta.</p>

        <div id="formError" class="form-error"></div>
        <div id="formExito" class="form-exito"></div>

        <div class="code-fields">
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric">
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric">
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric">
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric">
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric">
            <input class="code-digit" type="text" maxlength="1" inputmode="numeric">
        </div>

        <button class="btn" id="btnVerificar">Verificar cuenta</button>

        <div class="footer-link">
            ¿No recibiste el código? <a href="#" id="btnReenviar">Reenviar</a>
        </div>
    </div>

</div>

<script src="/static/pages/verify_email/script.js"></script>
</body>
</html>
